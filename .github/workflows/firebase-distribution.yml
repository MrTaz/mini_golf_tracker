name: Firebase App Distribution

on:
  push:
    branches:
      - master
      - main

jobs:
  build_and_distribute:
    strategy:
      matrix:
        platform: [android, ios]
        include:
          - platform: android
            os: ubuntu-latest
          - platform: ios
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      RELEASE_NOTES: ""
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          
      - name: Get dependencies
        run: flutter pub get

      - name: Calculate Semantic Version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          version_format: "${major}.${minor}.${patch}"
          
      - name: Tag new version
        if: matrix.platform == 'android'
        run: |
          git tag v${{ steps.semver.outputs.version }}
          git push origin v${{ steps.semver.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Android-specific signing & build
      - name: Decode Keystore
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        if: matrix.platform == 'android'
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        if: matrix.platform == 'android'
        run: flutter build appbundle --build-name=${{ steps.semver.outputs.version }} --build-number=${{ github.run_number }}

      - name: Upload AAB Artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      # iOS-specific signing & build
      - name: Install Apple Certificate and Provisioning Profile
        if: matrix.platform == 'ios'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS IPA
        if: matrix.platform == 'ios'
        run: flutter build ipa --release --build-name=${{ steps.semver.outputs.version }} --build-number=${{ github.run_number }} --export-method ad-hoc

      - name: Upload IPA Artifact
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
          retention-days: 7

      - name: Extract Push Commits for Changelog
        run: |
          # Read all commit messages from the push event payload using jq
          CHANGELOG=$(jq -r '.commits[].message' "$GITHUB_EVENT_PATH")
          
          # Write the multiline string to a GitHub environment variable
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload Android to Firebase App Distribution
        if: matrix.platform == 'android'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: '1:114725116317:android:299f9af42a67950a903774'
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: build/app/outputs/bundle/release/app-release.aab
          releaseNotes: ${{ env.RELEASE_NOTES }}

      - name: Upload iOS to Firebase App Distribution
        if: matrix.platform == 'ios'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: '1:114725116317:ios:61765a6d7b137631903774'
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: build/ios/ipa/*.ipa
          releaseNotes: ${{ env.RELEASE_NOTES }}

      - name: Clean up keychain
        if: ${{ always() && matrix.platform == 'ios' }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
