name: Firebase App Distribution

on:
  push:
    branches:
      - master
      - main

jobs:
  build_and_distribute:
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
        include:
          - platform: android
            os: ubuntu-latest
          - platform: ios
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      RELEASE_NOTES: ""
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          
      - name: Get dependencies
        run: flutter pub get

      - name: Calculate Semantic Version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          version_format: "${major}.${minor}.${patch}"
          
      - name: Tag new version
        if: matrix.platform == 'android'
        run: |
          git tag v${{ steps.semver.outputs.version }}
          git push origin v${{ steps.semver.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Android-specific signing & build
      - name: Decode Keystore
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # - name: Debug Keystore Fingerprint
      #   run: |
      #     echo "### Keystore Fingerprint in GitHub Actions ###"
      #     keytool -list -v -keystore android/app/upload-keystore.jks -alias ${{ secrets.KEY_ALIAS }} -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep "SHA256:"

      - name: Create key.properties
        if: matrix.platform == 'android'
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        if: matrix.platform == 'android'
        run: flutter build appbundle --build-name=${{ steps.semver.outputs.version }} --build-number=${{ github.run_number }}

      - name: Upload AAB Artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      # iOS-specific signing & build
      - name: Install Apple Certificate and Provisioning Profile
        if: matrix.platform == 'ios'
        env:
          BUILD_CERTIFICATE_BASE64: "${{ secrets.BUILD_CERTIFICATE_BASE64 }}"
          P12_PASSWORD: "${{ secrets.P12_PASSWORD }}"
          BUILD_PROVISION_PROFILE_BASE64: "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}"
          KEYCHAIN_PASSWORD: "${{ secrets.KEYCHAIN_PASSWORD }}"
        run: |
          # Create temporary file paths
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificate and provisioning profile from base64 secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the certificate into the temporary keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          
          # Allow codesign to access the certificate without a UI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply the provisioning profile so Xcode can find it by its UUID
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp $PP_PATH "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

      - name: Build iOS IPA
        if: matrix.platform == 'ios'
        run: flutter build ipa --release --build-name=${{ steps.semver.outputs.version }} --build-number=${{ github.run_number }} --export-method ad-hoc

      - name: Upload IPA Artifact
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
          retention-days: 7

      - name: Extract Push Commits for Changelog
        run: |
          # Read all commit messages from the push event payload using jq
          CHANGELOG=$(jq -r '.commits[].message' "$GITHUB_EVENT_PATH")
          
          # Write the multiline string to a GitHub environment variable
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload Android to Firebase App Distribution
        if: matrix.platform == 'android'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: "${{ secrets.FIREBASE_ANDROID_APP_ID }}"
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: build/app/outputs/bundle/release/app-release.aab
          releaseNotes: ${{ env.RELEASE_NOTES }}

      - name: Install Firebase CLI
        if: matrix.platform == 'ios'
        run: npm install -g firebase-tools

      - name: Upload iOS to Firebase App Distribution
        if: matrix.platform == 'ios'
        env:
          CREDENTIAL_FILE_CONTENT: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
        run: |
          # Safely ensure the credentials file is deleted when the script exits (success or failure)
          trap "rm -f google-credentials.json" EXIT

          # Write the JSON credential secret to a temporary file
          echo "$CREDENTIAL_FILE_CONTENT" > google-credentials.json

          # Tell the Firebase CLI where to find the auth file
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/google-credentials.json

          firebase appdistribution:distribute build/ios/ipa/*.ipa \
            --app "${{ secrets.FIREBASE_IOS_APP_ID }}" \
            --groups "testers" \
            --release-notes "${{ env.RELEASE_NOTES }}"

      - name: Clean up keychain
        if: ${{ always() && matrix.platform == 'ios' }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
