name: mini_golf_tracker
description: A mini golf score tracker app - Putt Scorer.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.0
  flutter_login: ^7.0.0
  font_awesome_flutter: ^11.0.0
  flutter_gravatar: ^2.0.0
  transparent_image: ^2.0.0
  word_generator: ^0.6.0
  recase: ^4.1.0
  shared_preferences: ^2.5.5
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.1
  random_x: ^0.3.1
  uuid: ^4.5.3
  animated_background: ^2.0.0
  confetti: ^0.8.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  cloud_firestore: ^5.0.0
  firebase_core: ^3.1.0
  world_holidays: ^2.0.1
  firebase_auth: ^5.7.0
  google_sign_in: ^7.2.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  http: ^1.2.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geocoding_platform_interface: ^3.2.0
  sign_in_with_apple: ^6.1.3
  flutter_facebook_auth: ^7.1.6
  marionette_flutter: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^3.1.0
  mock_exceptions: ^0.8.2
  firebase_auth_mocks: ^0.14.2
  url_launcher_platform_interface: ^2.3.2

  firebase_core_platform_interface: any
  firebase_auth_platform_interface: any
  plugin_platform_interface: any
  google_sign_in_platform_interface: any
  sign_in_with_apple_platform_interface: any
  provider: any
  patrol_mcp: ^0.1.4
  patrol: ^4.6.1
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

patrol:
  app_name: "Putt Scorer"
  test_directory: patrol_test
  android:
    package_name: "org.dahome.mini_golf_tracker"
  ios:
    bundle_id: "org.dahome.miniGolfScoreTracker"
